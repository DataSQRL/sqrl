name: Lint PR Title

on:
  pull_request_target:
    types: [opened, reopened, edited, synchronize]

jobs:
  validate:
    runs-on: ubuntu-slim
    permissions:
      pull-requests: read
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            test
            docs
            refactor
            ci
            build
            perf
            revert
